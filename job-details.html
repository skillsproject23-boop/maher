    <style>
        .cd-wrap { padding: 2.5rem 0 3rem; min-height: 50vh; }
        .cd-card { max-width: 820px; margin: 0 auto; overflow: hidden; border-radius: 22px; border: 1px solid rgba(148,163,184,0.18); box-shadow: 0 20px 50px rgba(0,0,0,0.35); }
        .cd-hero {
            position: relative;
            height: 220px;
            overflow: hidden;
            background: #0b1220;
        }
        .cd-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(5,8,22,0.05) 0%, rgba(5,8,22,0.75) 100%);
            pointer-events: none;
        }
        .cd-hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .cd-card-inner {
            background: linear-gradient(145deg, rgba(30,41,80,0.92), rgba(15,23,42,0.95));
            padding: 2rem 1.75rem;
        }
        .cd-kicker { font-size: 0.82rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.04em; margin: 0 0 0.5rem; }
        .cd-title { font-size: 1.75rem; font-weight: 800; color: #f8fafc; margin: 0 0 1rem; line-height: 1.35; }
        .cd-meta-row { display: flex; flex-wrap: wrap; gap: 0.5rem 0.75rem; align-items: center; margin-bottom: 1.25rem; }
        .cd-chip { background: rgba(56,189,248,0.15); color: #7dd3fc; padding: 0.25rem 0.65rem; border-radius: 999px; font-size: 0.78rem; font-weight: 600; border: 1px solid rgba(56,189,248,0.35); }
        .cd-meta { font-size: 0.88rem; color: rgba(226,232,240,0.75); }
        .cd-desc { font-size: 0.95rem; line-height: 1.75; color: rgba(241,245,249,0.88); margin-bottom: 1.5rem; }
        .cd-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
        .cd-footnote { font-size: 0.82rem; color: rgba(148,163,184,0.85); line-height: 1.6; margin: 0; }
        .cd-error { text-align: center; padding: 3rem 1rem; color: rgba(248,250,252,0.85); font-size: 1rem; }
        .cd-loading-card {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.75rem;
            border-radius: 22px;
            border: 1px solid rgba(148,163,184,0.14);
            background: linear-gradient(145deg, rgba(30,41,80,0.55), rgba(15,23,42,0.65));
        }
        .cd-loading-label {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(148, 163, 184, 0.9);
            margin: 0 0 1.25rem;
        }
        .cd-skeleton-line {
            height: 14px;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            background: linear-gradient(90deg, rgba(51,65,85,0.5) 0%, rgba(100,116,139,0.35) 50%, rgba(51,65,85,0.5) 100%);
            background-size: 200% 100%;
            animation: cdShimmer 1.2s ease-in-out infinite;
        }
        .cd-skeleton-line.w40 { width: 40%; }
        .cd-skeleton-line.w55 { width: 55%; }
        .cd-skeleton-line.w70 { width: 70%; }
        .cd-skeleton-line.w85 { width: 85%; }
        .cd-skeleton-line.w100 { width: 100%; height: 18px; }
        @keyframes cdShimmer {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }
        .cd-cert-bar {
            margin: 0 0 1.25rem;
            padding: 0.65rem 1rem;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.28);
            color: #bae6fd;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
        }
        .cd-goals { margin: 0 0 1.5rem; }
        .cd-goal-general {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 55%, #3b82f6 100%);
            border-radius: 14px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 0.25rem;
        }
        .cd-goal-general-title {
            margin: 0 0 0.55rem;
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            text-align: center;
        }
        .cd-goal-general-text {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.96);
            text-align: center;
        }
        .cd-goal-list {
            list-style: none;
            margin: 0;
            padding: 0;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 14px;
            overflow: hidden;
        }
        .cd-goal-list li {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            padding: 0.85rem 1.1rem;
            font-size: 0.92rem;
            line-height: 1.65;
            color: rgba(241, 245, 249, 0.92);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }
        .cd-goal-list li:last-child { border-bottom: none; }
        .cd-goal-list li::before {
            content: "";
            flex-shrink: 0;
            width: 0;
            height: 0;
            margin-top: 0.45rem;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-inline-end: 7px solid #3b82f6;
        }
        .visually-hidden {
            position: absolute !important;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0);
            white-space: nowrap; border: 0;
        }
    </style>
</head>
