<!DOCTYPE html>
<html class="maher-loading" lang="ar" dir="rtl" data-i18n-doc-title="page.register.docTitle">
<head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://jgvfcievyfkyldryatlk.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://jgvfcievyfkyldryatlk.supabase.co" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب | أكاديمية ماهر</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="auth-split-page">
    <div class="auth-page-bg" aria-hidden="true">
        <img src="assets/images/oo.png" alt="" />
    </div>
    <div class="auth-floating-lines-wrap" aria-hidden="true"><canvas id="authFloatingLines"></canvas></div>
    <div class="auth-split">
        <aside class="auth-split-brand">
            <div class="auth-split-brand-inner">
                <div class="auth-split-brand-logo">
                    <img src="assets/images/sh.png" alt="" width="120" height="44" />
                </div>
                <h2 class="auth-split-brand-title" data-i18n="authSplit.brandTitle"></h2>
                <p class="auth-split-brand-lead" data-i18n="authSplit.brandLead"></p>
                <ul class="auth-split-features">
                    <li class="auth-split-feature">
                        <span class="auth-split-feature-ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                        </span>
                        <span data-i18n="authSplit.f1"></span>
                    </li>
                    <li class="auth-split-feature">
                        <span class="auth-split-feature-ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                        </span>
                        <span data-i18n="authSplit.f2"></span>
                    </li>
                    <li class="auth-split-feature">
                        <span class="auth-split-feature-ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
                        </span>
                        <span data-i18n="authSplit.f3"></span>
                    </li>
                    <li class="auth-split-feature">
                        <span class="auth-split-feature-ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 6-6"/></svg>
                        </span>
                        <span data-i18n="authSplit.f4"></span>
                    </li>
                </ul>
                <div class="auth-split-stats">
                    <div class="auth-split-stat">
                        <div class="auth-split-stat-val" data-i18n="authSplit.stat1v"></div>
                        <div class="auth-split-stat-lbl" data-i18n="authSplit.stat1l"></div>
                    </div>
                    <div class="auth-split-stat">
                        <div class="auth-split-stat-val" data-i18n="authSplit.stat2v"></div>
                        <div class="auth-split-stat-lbl" data-i18n="authSplit.stat2l"></div>
                    </div>
                    <div class="auth-split-stat">
                        <div class="auth-split-stat-val" data-i18n="authSplit.stat3v"></div>
                        <div class="auth-split-stat-lbl" data-i18n="authSplit.stat3l"></div>
                    </div>
                </div>
            </div>
            <div class="auth-split-quote">
                <p data-i18n="authSplit.quote"></p>
                <cite data-i18n="authSplit.quoteName"></cite>
                <span data-i18n="authSplit.quoteRole"></span>
            </div>
        </aside>

        <div class="auth-split-panel">
            <div class="auth-split-panel-inner">
                <div class="auth-split-toolbar">
                    <a href="index.html" class="auth-split-back">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
                        <span data-i18n="authSplit.backHome"></span>
                    </a>
                    <div class="lang-switch">
                        <button type="button" class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                        <button type="button" class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>
                    </div>
                </div>

                <div class="auth-split-card">
                    <div class="auth-split-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span data-i18n="authSplit.traineeBadge"></span>
                    </div>
                    <h1 class="auth-title" data-i18n="authSplit.welcomeRegister"></h1>
                    <p class="auth-subtitle" data-i18n="authSplit.registerLead"></p>

                    <div class="auth-split-scroll">
                        <form id="registerSeekerForm" class="register-form">
                            <div class="auth-form-group">
                                <label for="seekerFullName" data-i18n="register.seeker.fullName.label">الاسم الكامل</label>
                                <div class="auth-split-input-wrap">
                                    <input id="seekerFullName" type="text" data-i18n-placeholder="register.seeker.fullName.placeholder" placeholder="الاسم الثلاثي" />
                                    <span class="auth-split-input-ic" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                    </span>
                                </div>
                            </div>
                            <div class="auth-form-group">
                                <label for="seekerEmail" data-i18n="form.email.label">البريد الإلكتروني</label>
                                <div class="auth-split-input-wrap">
                                    <input id="seekerEmail" type="email" data-i18n-placeholder="form.email.placeholder" placeholder="example@domain.com" dir="ltr" />
                                    <span class="auth-split-input-ic" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6l-10 7L2 6"/></svg>
                                    </span>
                                </div>
                            </div>
                            <div class="auth-form-group">
                                <label for="seekerPhone" data-i18n="register.common.phone.label">رقم الجوال</label>
                                <div class="auth-split-input-wrap">
                                    <input id="seekerPhone" type="tel" data-i18n-placeholder="register.common.phone.placeholder" placeholder="05XXXXXXXX" dir="ltr" />
                                    <span class="auth-split-input-ic" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.12.81.3 1.59.54 2.34a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.74-2.11a2 2 0 012.11-.45c.75.24 1.53.42 2.34.54A2 2 0 0122 16.92z"/></svg>
                                    </span>
                                </div>
                            </div>
                            <div class="auth-form-group">
                                <label for="seekerCity" data-i18n="register.common.city.label">المدينة</label>
                                <div class="auth-split-input-wrap">
                                    <input id="seekerCity" type="text" data-i18n-placeholder="register.common.city.placeholder" placeholder="مثال: الرياض" />
                                    <span class="auth-split-input-ic" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                    </span>
                                </div>
                            </div>
                            <div class="auth-form-group">
                                <label for="seekerPassword" data-i18n="form.password.label">كلمة المرور</label>
                                <div class="auth-split-input-wrap">
                                    <input id="seekerPassword" type="password" data-i18n-placeholder="form.password.placeholder" placeholder="••••••••" />
                                    <button type="button" class="auth-split-pw-toggle" data-toggle-password="seekerPassword" aria-pressed="false" aria-label="إظهار/إخفاء كلمة المرور">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                    <span class="auth-split-input-ic" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M12 15v2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
                                    </span>
                                </div>
                            </div>
                            <div class="auth-form-group">
                                <label for="seekerPasswordConfirm" data-i18n="register.common.confirmPassword.label">تأكيد كلمة المرور</label>
                                <div class="auth-split-input-wrap">
                                    <input id="seekerPasswordConfirm" type="password" data-i18n-placeholder="register.common.confirmPassword.placeholder" placeholder="أعد إدخال كلمة المرور" />
                                    <button type="button" class="auth-split-pw-toggle" data-toggle-password="seekerPasswordConfirm" aria-pressed="false" aria-label="إظهار/إخفاء كلمة المرور">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                    <span class="auth-split-input-ic" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M12 15v2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
                                    </span>
                                </div>
                            </div>

                            <div class="auth-submit">
                                <button type="submit" class="btn btn-primary btn-full" data-i18n="register.submit">إنشاء الحساب</button>
                            </div>
                        </form>
                    </div>

                    <p class="auth-split-switch">
                        <span data-i18n="register.haveAccount">لديك حساب بالفعل؟</span>
                        <a href="login.html" data-i18n="register.login">تسجيل الدخول</a>
                    </p>
                </div>

                <div class="auth-split-foot">
                    <span data-i18n="footer.copy"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="assets/js/supabaseClient.js" defer></script>
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
