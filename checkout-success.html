<!DOCTYPE html>
<html class="maher-loading" lang="ar" dir="rtl" data-i18n-doc-title="checkout.successTitle">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تم الدفع | أكاديمية ماهر</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="maher-no-cart">
    <header class="main-header">
        <div class="container header-inner">
            <div class="header-main-group">
                <a href="index.html" class="logo">
                    <img src="assets/images/sh.png" alt="أكاديمية ماهر" class="logo-img">
                </a>
                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
                    <a href="courses.html" class="nav-link" data-i18n="nav.catalog"></a>
                </nav>
            </div>
            <div class="lang-switch">
                <button class="lang-btn" data-lang="ar" data-i18n="header.langAr">العربية</button>
                <button class="lang-btn" data-lang="en" data-i18n="header.langEn">English</button>
            </div>
        </div>
    </header>

    <main class="checkout-page">
        <div class="container checkout-wrap checkout-success-wrap">
            <div id="checkoutSuccessRoot" class="checkout-success-card">
                <div class="checkout-success-icon" aria-hidden="true">✓</div>
                <h1 id="checkoutSuccessTitle" data-i18n="checkout.successHeading">تم الدفع بنجاح</h1>
                <p id="checkoutSuccessBody" data-i18n="checkout.successBody">جارٍ تفعيل تسجيلك في الدورات…</p>
                <div id="checkoutSuccessCourses" class="checkout-success-list"></div>
                <div class="checkout-success-actions">
                    <a href="courses.html" class="btn btn-primary" data-i18n="checkout.backCourses">العودة للدورات</a>
                    <a href="dashboard.html" class="btn btn-outline" data-i18n="checkout.myDashboard" style="display:none;" id="goDashboardBtn">لوحة التحكم</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="assets/js/supabaseClient.js" defer></script>
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/maher-cart.js" defer></script>
    <script src="assets/js/checkout-success.js" defer></script>
</body>
</html>
